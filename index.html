<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>BARBARE — Melikoun</title>

  <meta
    name="description"
    content="BARBARE, le spectacle de stand-up de Melikoun. Vidéo et réservation en ligne."
  >

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;800;900&display=swap"
    rel="stylesheet"
  >

  <style>
    :root {
      --black: #000000;
      --white: #ffffff;
      --grey: #9b9b9b;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html {
      scroll-behavior: smooth;
      background: var(--black);
    }

    body {
      background: var(--black);
      color: var(--white);
      font-family: "Inter", Arial, Helvetica, sans-serif;
      overflow-x: hidden;
    }

    a {
      color: inherit;
    }

    .hero {
      min-height: 100svh;
      position: relative;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      padding: 24px;
      overflow: hidden;
      border-bottom: 1px solid rgba(255, 255, 255, 0.25);
    }

    .hero-top {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.18em;
      text-transform: uppercase;
    }

    .hero-title {
      width: 100%;
      font-size: clamp(72px, 22vw, 350px);
      font-weight: 900;
      line-height: 0.72;
      letter-spacing: -0.11em;
      text-transform: uppercase;
      white-space: nowrap;
      transform: translateX(-0.045em);
      animation: titleEntrance 1.1s cubic-bezier(.16, 1, .3, 1) both;
    }

    .hero-bottom {
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
      gap: 20px;
    }

    .artist-name {
      font-size: clamp(18px, 2.5vw, 35px);
      font-weight: 800;
      letter-spacing: -0.06em;
      text-transform: lowercase;
    }

    .scroll-indicator {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      writing-mode: vertical-rl;
    }

    .statement {
      min-height: 80svh;
      display: flex;
      align-items: center;
      padding: clamp(28px, 6vw, 100px);
      border-bottom: 1px solid rgba(255, 255, 255, 0.25);
    }
    
    .statement p {
      max-width: 1500px;
      font-size: clamp(42px, 8vw, 150px);
      font-weight: 900;
      line-height: 0.86;
      letter-spacing: -0.08em;
      text-transform: uppercase;
    }

    .video-section {
      padding: clamp(20px, 4vw, 60px);
      border-bottom: 1px solid rgba(255, 255, 255, 0.25);
    }

    .section-label {
      display: flex;
      justify-content: space-between;
      margin-bottom: 18px;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.18em;
      text-transform: uppercase;
    }

    .video-wrapper {
      width: 100%;
      aspect-ratio: 16 / 9;
      background: #111111;
      overflow: hidden;
    }

    .video-wrapper iframe {
      width: 100%;
      height: 100%;
      display: block;
      border: 0;
      filter: grayscale(100%) contrast(1.08);
    }

    .booking-section {
      min-height: 100svh;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      padding: 24px;
      background: var(--white);
      color: var(--black);
    }

    .booking-heading {
      max-width: 1500px;
      font-size: clamp(65px, 16vw, 260px);
      font-weight: 900;
      line-height: 0.72;
      letter-spacing: -0.11em;
      text-transform: uppercase;
      overflow-wrap: anywhere;
    }

    .booking-bottom {
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
      gap: 30px;
    }

    .booking-info {
      font-size: clamp(14px, 1.5vw, 20px);
      font-weight: 700;
      line-height: 1.4;
      text-transform: uppercase;
    }
    
   .i-letter{
    display:inline-block;
    transform:translateX(0.08em);
}

    .booking-button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: min(100%, 390px);
      min-height: 90px;
      padding: 24px 36px;
      background: var(--black);
      color: var(--white);
      border: 3px solid var(--black);
      text-decoration: none;
      font-size: clamp(18px, 2.5vw, 32px);
      font-weight: 900;
      letter-spacing: -0.05em;
      text-transform: uppercase;
      transition:
        background 180ms ease,
        color 180ms ease,
        transform 180ms ease;
    }

    .booking-button:hover {
      background: var(--white);
      color: var(--black);
      transform: translate(-6px, -6px);
      box-shadow: 6px 6px 0 var(--black);
    }

    .booking-button:focus-visible {
      outline: 4px solid var(--black);
      outline-offset: 5px;
    }

    footer {
      min-height: 35svh;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      padding: 24px;
      background: var(--black);
      color: var(--white);
    }

    .footer-title {
      font-size: clamp(60px, 14vw, 220px);
      font-weight: 900;
      line-height: 0.75;
      letter-spacing: -0.1em;
      text-transform: uppercase;
    }

    .footer-bottom {
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
      gap: 20px;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.16em;
      text-transform: uppercase;
    }

    @keyframes titleEntrance {
      from {
        opacity: 0;
        transform: translateY(100px) translateX(-0.045em);
      }

      to {
        opacity: 1;
        transform: translateY(0) translateX(-0.045em);
      }
    }

    @media (max-width: 700px) {
      .hero {
        padding: 16px;
      }

      .hero-title {
    font-size: 20vw;
    line-height: 0.78;
    white-space: nowrap;
    overflow-wrap: normal;
    letter-spacing: -0.11em;
    transform: translateX(-0.02em);
}

      .hero-bottom {
        align-items: center;
      }

      .statement {
        min-height: 65svh;
        padding: 70px 16px;
      }

      .statement p {
        font-size: clamp(42px, 14vw, 80px);
      }

      .video-section {
        padding: 16px;
      }

      .booking-section {
        min-height: 90svh;
        padding: 16px;
      }

      .booking-heading {
    font-size: 17vw;
    line-height: 0.78;
    letter-spacing: -0.08em;
    white-space: nowrap;
}

      .booking-bottom {
        flex-direction: column;
        align-items: stretch;
      }

      .booking-button {
        width: 100%;
      }

      footer {
        padding: 16px;
      }

      .footer-bottom {
        flex-direction: column;
        align-items: flex-start;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      html {
        scroll-behavior: auto;
      }

      .hero-title {
        animation: none;
      }

      .booking-button {
        transition: none;
      }
    }
  </style>
</head>

<body>

  <main>

    <section class="hero">
      <div class="hero-top">
        <span>Stand-up</span>
        <span>Melikoun</span>
      </div>

      <h1 class="hero-title">Barbare</h1>

      <div class="hero-bottom">
        <p class="artist-name">melikoun</p>
        <span class="scroll-indicator">descendre</span>
      </div>
    </section>

    <section class="statement">
      <p>
        C'est pas pour tout le monde.<br>
        C'est<br>
        pour Nous.
      </p>
    </section>

    <section class="video-section">
      <div class="section-label">
        <span>Vidéo</span>
        <span>01</span>
      </div>

      <div class="video-wrapper">
        <iframe
          src="https://www.youtube.com/embed/uTjYhdwxWVY?rel=0"
          title="Melikoun — Barbare"
          loading="lazy"
          allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
          referrerpolicy="strict-origin-when-cross-origin"
          allowfullscreen>
        </iframe>
      </div>
    </section>

    <section class="booking-section">
      <h2 class="booking-heading">
        Pas du tout<br>
        fam<span class="i-letter">i</span>lial.
      </h2>

      <div class="booking-bottom">
        <p class="booking-info">
          Melikoun<br>
        </p>

        <a
          class="booking-button"
          href="https://www.billetweb.fr/melikoun-la-ferme-comedy-club"
          target="_blank"
          rel="noopener noreferrer"
        >
          Réserver
        </a>
      </div>
    </section>

  </main>

  <footer>
    <p class="footer-title">Melikoun</p>

    <div class="footer-bottom">
      <span>Barbare</span>
      <span>© 2026</span>
    </div>
  </footer>

</body>
</html>
